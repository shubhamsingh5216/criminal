services:
  - type: web
    name: criminal-backend
    env: docker
    branch: main
    plan: free
    dockerfilePath: backend/Dockerfile
    buildCommand: ""
    startCommand: "gunicorn project.wsgi:application --bind 0.0.0.0:8000"
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DISABLE_FACE_MODEL
        sync: false
